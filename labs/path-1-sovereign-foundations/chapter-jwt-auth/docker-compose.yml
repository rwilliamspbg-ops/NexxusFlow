# JWT Auth Stack Deployment — Docker Compose for NexusFlow Lab

services:
  # Backend Service with user namespace isolation and capability hardening
  jwt-auth-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    user: "${UID:-1000}:${GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    volumes:
      - ./data:/var/lib/app-data
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_ISSUER=${JWT_ISSUER:-nexusflow-jwt-lab}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-nexusflow-lab-clients}
      - JWT_TTL=${JWT_TTL:-15m}
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    read_only: true
    tmpfs:
      - /prometheus
      - /tmp
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
    depends_on:
      jwt-auth-backend:
        condition: service_started
