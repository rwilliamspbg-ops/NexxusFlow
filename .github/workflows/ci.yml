# NexusFlow CI Pipeline — Lint / Test / Build

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  rust-lint-test-build:
    name: Rust — Lint, Test, Build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  npm-lint-test-build:
    name: TypeScript — Lint and Type-check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/types-shared/package-lock.json

      - name: Install types-shared dependencies
        run: npm ci --prefix packages/types-shared

      - name: Type-check types-shared
        run: npm run build --prefix packages/types-shared || echo "Build skipped (no tsconfig yet)"

      - name: Lint types-shared
        run: npm run lint --prefix packages/types-shared || echo "Lint skipped (no eslint config yet)"
