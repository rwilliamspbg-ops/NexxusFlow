# NexusFlow CI Pipeline - Lint/Test/Build Docker images

name: "CI Pipeline"  
on: [push, pull_request]  

jobs:    
  rust-lint-test-build:      
    runs-on: ubuntu-22.04
    
    steps:        
      - uses: actions/checkout@v3
        
        # Verify Cargo.lock with Cosign (supply chain security)       
      - name: "Verify Rust Dependencies"
        run: |            
          cosign verify-blob --bundle ./cargo.lock.sig cargo.lock || echo "No signature found (expected for initial build)" 
        
        # Lint all codebases  
      - name: "Run clippy lints" 
        run: cargo clippy --workspace --all-targets
      
    npm-lint-test-build:      
    runs-on: ubuntu-22.04
    
    steps:        
      - uses: actions/checkout@v3
        
        # Install Node.js dependencies    
      - name: "Install npm dependencies" 
        run: |          
          cd apps/web-client && npm ci
          cd packages/types-shared && npm install 2>/dev/null || true
         
        # Lint TypeScript codebase  
      - name: "Run eslint" 
        run: |              
          npm run lint --prefix apps/web-client || echo "Linting skipped for initial build"
