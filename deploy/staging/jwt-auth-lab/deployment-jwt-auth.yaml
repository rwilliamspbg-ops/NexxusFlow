apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-auth-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-auth-backend
  template:
    metadata:
      labels:
        app: jwt-auth-backend
    spec:
      containers:
        - name: jwt-auth-backend
          image: nexusflow/jwt-auth-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: jwt-auth-runtime-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-auth-runtime-secrets
                  key: JWT_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi