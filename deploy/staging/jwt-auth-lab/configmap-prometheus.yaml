apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-auth-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/prometheus.rules.yml

    scrape_configs:
      - job_name: jwt_auth_backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - jwt-auth-backend:8080
  prometheus.rules.yml: |
    groups:
      - name: jwt_auth_lab
        rules:
          - record: jwt_lab_auth_success_ratio
            expr: |
              sum(jwt_lab_auth_success_total)
              /
              clamp_min(sum(jwt_lab_auth_requests_total), 1)

          - alert: JWTLabAuthFailuresDetected
            expr: increase(jwt_lab_auth_failure_total[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: JWT lab auth failures detected
              description: The JWT lab backend has served one or more failed auth requests in the last five minutes.

          - alert: JWTLabReadyEndpointDown
            expr: up{job="jwt_auth_backend"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: JWT lab backend is unreachable
              description: Prometheus cannot scrape the JWT lab backend metrics endpoint.
