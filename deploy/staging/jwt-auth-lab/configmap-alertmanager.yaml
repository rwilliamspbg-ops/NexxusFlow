apiVersion: v1
kind: ConfigMap
metadata:
  name: jwt-auth-alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: jwt-auth-runtime-webhook
      group_by: [alertname, severity]
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 4h

    receivers:
      - name: jwt-auth-runtime-webhook
        webhook_configs:
          - url: http://jwt-auth-backend:8080/alerts
            send_resolved: true
